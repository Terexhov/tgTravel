services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: ./tg_bot
    restart: unless-stopped
    env_file: ./tg_bot/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - METRICS_DB=/app/data/metrics.db
    volumes:
      - bot_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
  bot_data:
